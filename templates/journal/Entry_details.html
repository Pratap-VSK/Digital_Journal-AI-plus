{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
        <a href="{% url 'dashboard' %}" class="inline-flex items-center gap-2 text-slate-400 hover:text-slate-900 font-bold transition w-max">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Dashboard
        </a>
        
        <div class="flex gap-3">
            <a href="{% url 'entry_update' entry.pk %}" class="px-5 py-2.5 bg-yellow-50 text-yellow-700 hover:bg-yellow-100 border border-yellow-200 rounded-xl font-bold transition flex items-center gap-2 shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                Edit
            </a>
            
            <form action="{% url 'entry_delete' entry.pk %}" method="post" onsubmit="return confirm('Delete this entry permanently? This action cannot be undone.');" class="inline">
                {% csrf_token %}
                <button type="submit" class="px-5 py-2.5 bg-red-50 text-red-700 hover:bg-red-100 border border-red-200 rounded-xl font-bold transition flex items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Delete
                </button>
            </form>
        </div>
    </div>

    <article class="bg-white rounded-[3rem] shadow-2xl shadow-slate-200/50 border border-slate-100 p-8 md:p-16 relative overflow-hidden">
        
        <div class="absolute top-0 right-0 w-64 h-64 bg-gradient-to-br from-blue-50 to-purple-50 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
        
        <header class="mb-14 border-b border-slate-100 pb-10 relative z-10">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
                <div class="flex items-center gap-2 text-slate-400 font-bold tracking-widest uppercase text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    {{ entry.created_at|date:"l, F j, Y" }}
                </div>
                
                <div class="bg-slate-900 text-white px-5 py-2.5 rounded-full text-sm font-bold flex items-center gap-3 shadow-lg shadow-slate-900/20 w-max">
                    <span class="text-blue-400">AI Mood:</span> {{ entry.mood_tag|default:"Neutral" }}
                </div>
            </div>
            
            <h1 class="text-5xl md:text-6xl font-black text-slate-900 leading-[1.1] tracking-tight">{{ entry.title }}</h1>
        </header>
        
        <div class="prose prose-lg md:prose-xl max-w-none text-slate-700 leading-relaxed font-serif relative z-10 whitespace-pre-wrap">{{ entry.content }}</div>
        
    </article>
</div>
{% endblock %}
