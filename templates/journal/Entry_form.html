{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="flex items-center justify-between mb-8">
        <a href="{% url 'dashboard' %}" class="inline-flex items-center gap-2 text-slate-400 hover:text-slate-900 font-bold transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Cancel & Return
        </a>
        
        <div class="bg-green-50 text-green-700 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm border border-green-100">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            Auto-Save Active
        </div>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden relative">
        
        <div class="h-2 w-full bg-gradient-to-r from-blue-500 to-indigo-600"></div>

        <form method="post" class="p-8 md:p-14">
            {% csrf_token %}
            
            <style>
                #id_title { width: 100%; font-size: 3rem; font-weight: 900; color: #0f172a; border: none; background: transparent; outline: none; margin-bottom: 2rem; line-height: 1.2; letter-spacing: -0.025em; }
                #id_title::placeholder { color: #cbd5e1; }
                
                #id_content { width: 100%; min-height: 500px; font-size: 1.25rem; line-height: 1.8; color: #334155; border: none; background: transparent; outline: none; resize: vertical; font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif; }
                #id_content::placeholder { color: #94a3b8; font-style: italic; }
                
                label[for="id_title"], label[for="id_content"] { display: none; }
            </style>

            <input type="text" name="{{ form.title.name }}" id="id_title" value="{{ form.title.value|default:'' }}" placeholder="Give it a title..." required autofocus>
            
            <textarea name="{{ form.content.name }}" id="id_content" placeholder="Start typing your thoughts here..." required>{{ form.content.value|default:'' }}</textarea>
            
            <div class="mt-10 pt-8 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-6">
                <p class="text-sm text-slate-400 font-bold flex items-center gap-2">
                    <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    End-to-End Encrypted
                </p>
                
                <button type="submit" class="w-full sm:w-auto px-10 py-4 bg-slate-900 hover:bg-slate-800 text-white rounded-2xl font-bold shadow-xl shadow-slate-900/20 transition-all hover:-translate-y-1 flex items-center justify-center gap-3">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Save & Run AI Analysis
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
