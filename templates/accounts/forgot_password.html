<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Account | ProJournal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        input { outline: none; transition: all 0.2s; }
        input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    </style>
</head>
<body class="bg-slate-50 antialiased min-h-screen flex items-center justify-center p-6">
    
    <div x-data="passwordResetFlow()" class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border border-slate-100 relative overflow-hidden">
        
        <div x-show="loading" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div>
        </div>

        <div x-show="error" x-transition class="mb-4 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-xl border border-red-200 text-center" x-text="error"></div>

        <div x-show="step === 1" x-transition.opacity.duration.300ms>
            <h2 class="text-3xl font-black text-slate-900 text-center">Forgot Password</h2>
            <p class="text-slate-500 font-medium text-center text-sm mt-2 mb-6">Enter your registered email to receive a 6-digit OTP.</p>
            
            <label class="block text-[0.75rem] font-extrabold text-slate-600 mb-1.5 uppercase tracking-wide">Email Address</label>
            <input type="email" x-model="email" placeholder="you@example.com" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 mb-4" @keydown.enter="sendOTP">
            
            <button @click="sendOTP" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-lg transition active:scale-95">Send OTP</button>
            <div class="mt-4 text-center">
                <a href="{% url 'login' %}" class="text-xs font-bold text-slate-500 hover:text-slate-900">← Back to Login</a>
            </div>
        </div>

        <div x-show="step === 2" x-transition.opacity.duration.300ms style="display: none;">
            <div class="w-16 h-16 mx-auto bg-indigo-50 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-900 text-center">Enter Security Code</h2>
            <p class="text-slate-500 font-medium text-center text-sm mt-2 mb-6">We've sent a 6-digit OTP to <br><span class="font-bold text-slate-800" x-text="email"></span></p>
            
            <input type="text" x-model="otp" maxlength="6" placeholder="• • • • • •" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 mb-4 text-center text-2xl font-black tracking-[0.5em]" @keydown.enter="verifyOTP">
            
            <button @click="verifyOTP" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-500/30 transition active:scale-95">Verify OTP</button>
            <div class="mt-4 text-center">
                <button @click="step = 1" class="text-xs font-bold text-slate-500 hover:text-indigo-600">Wrong email?</button>
            </div>
        </div>

        <div x-show="step === 3" x-transition.opacity.duration.300ms style="display: none;">
            <h2 class="text-2xl font-black text-slate-900 text-center mb-6">Create New Password</h2>
            
            <label class="block text-[0.75rem] font-extrabold text-slate-600 mb-1.5 uppercase tracking-wide">New Password</label>
            <input type="password" x-model="password" placeholder="Min. 8 characters" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 mb-4" @keydown.enter="resetPassword">
            
            <button @click="resetPassword" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition active:scale-95">Save Password</button>
        </div>

        <div x-show="step === 4" x-transition.opacity.duration.300ms style="display: none;" class="text-center">
            <div class="w-20 h-20 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-4">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-900">Password Updated!</h2>
            <p class="text-slate-500 font-medium text-sm mt-2 mb-8">Your account is secure. Redirecting to login...</p>
            <a href="{% url 'login' %}" class="w-full block bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition">Login Now</a>
        </div>

    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function passwordResetFlow() {
            return {
                step: 1,
                email: '',
                otp: '',
                password: '',
                loading: false,
                error: '',
                csrftoken: getCookie('csrftoken'),

                async apiCall(action, data) {
                    this.loading = true;
                    this.error = '';
                    try {
                        const response = await fetch("{% url 'forgot_password' %}", {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': this.csrftoken
                            },
                            body: JSON.stringify({ action: action, ...data })
                        });
                        const result = await response.json();
                        this.loading = false;
                        return result;
                    } catch (e) {
                        this.loading = false;
                        this.error = "Something went wrong. Check internet connection.";
                        return { success: false };
                    }
                },

                async sendOTP() {
                    if (!this.email) { this.error = "Please enter your email."; return; }
                    const res = await this.apiCall('send_otp', { email: this.email });
                    if (res.success) this.step = 2;
                },

                async verifyOTP() {
                    if (this.otp.length !== 6) { this.error = "Enter complete 6-digit OTP."; return; }
                    const res = await this.apiCall('verify_otp', { otp: this.otp });
                    if (res.success) { this.step = 3; } 
                    else { this.error = res.message; }
                },

                async resetPassword() {
                    if (this.password.length < 4) { this.error = "Password too short."; return; }
                    const res = await this.apiCall('reset_password', { password: this.password });
                    if (res.success) { 
                        this.step = 4;
                        // 3 seconds baad apne aap login page par jayega
                        setTimeout(() => { window.location.href = "{% url 'login' %}"; }, 3000);
                    } else { 
                        this.error = res.message; 
                    }
                }
            }
        }
    </script>
</body>
</html>
