<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProJournal | AI Powered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-800 antialiased" x-data="{ mobileMenu: false }">

    <nav class="fixed w-full top-0 z-50 {% if user.is_authenticated %}bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm{% else %}bg-transparent absolute{% endif %} transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="{% url 'home' %}" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </div>
                    <span class="text-2xl font-black text-slate-900 tracking-tight">Pro<span class="text-blue-600">Journal</span></span>
                </a>

                <div class="hidden md:flex items-center gap-6">
                    {% if user.is_authenticated %}
                        <a href="{% url 'dashboard' %}" class="text-slate-600 font-bold hover:text-blue-600 transition">Dashboard</a>
                        <a href="{% url 'entry_create' %}" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition shadow-lg flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> New Entry
                        </a>
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="text-red-500 font-bold hover:bg-red-50 px-4 py-2 rounded-xl transition">Sign out</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-slate-600 font-bold hover:text-blue-600 transition">Sign in</a>
                        <a href="{% url 'register' %}" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-500/30">Get Started</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    {% if messages %}
    <div class="fixed top-24 right-4 z-50 flex flex-col gap-2">
        {% for message in messages %}
        <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 4000)" class="px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 border bg-white text-slate-800 font-bold border-slate-200">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-grow flex flex-col {% if user.is_authenticated %}pt-28 pb-16{% else %}pt-0{% endif %} w-full relative z-10">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
